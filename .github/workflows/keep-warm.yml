name: Keep Render warm

# Пингует /health, чтобы free-инстанс Render не засыпал (спин-даун через ~15 мин простоя).
# Расписание GitHub Actions неточное (возможны задержки) — перед защитой всё равно прогрей сервис вручную.
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          for i in 1 2 3; do
            if curl -fsS --max-time 90 https://diplomafinal-tzc7.onrender.com/health; then
              echo "ok"
              exit 0
            fi
            sleep 10
          done
          echo "ping failed (non-fatal)"
          exit 0
